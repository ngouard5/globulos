<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>globulos</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      body {
        background: #c7f554;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: 'Fredoka', sans-serif;
        color: #fff8e8;
      }
      #lobby {
        text-align: center;
        padding: 36px 28px;
        max-width: 420px;
        width: 90%;
      }
      .logo-panel {
        background:
          linear-gradient(180deg, #b8884a 0%, #b8884a 6px, transparent 6px),
          linear-gradient(180deg, transparent calc(100% - 6px), #6a4420 calc(100% - 6px)),
          linear-gradient(180deg, #9b6b36, #8b5e30);
        border: 2px solid #5a3818;
        border-radius: 14px;
        padding: 14px 24px 10px;
        margin-bottom: 22px;
        box-shadow: 0 5px 0 #5a3818, 0 8px 16px rgba(0,0,0,0.3);
        display: inline-block;
      }
      .logo-img {
        max-width: 100%;
        display: block;
      }

      /* ── Sections ── */
      .lobby-section {
        background: rgba(0,0,0,0.35);
        border: 2px solid rgba(255,255,255,0.1);
        border-radius: 16px;
        padding: 20px 22px;
        margin-bottom: 14px;
      }
      .lobby-section h2 {
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 3px;
        color: rgba(255,248,232,0.7);
        margin-bottom: 14px;
        font-weight: normal;
      }
      .lobby-section .desc {
        font-size: 13px;
        color: rgba(255,248,232,0.65);
        margin-top: 10px;
        line-height: 1.4;
      }

      /* ── Buttons ── */
      #lobby button {
        font-family: 'Fredoka', sans-serif;
        font-size: 18px;
        font-weight: bold;
        padding: 14px 32px;
        border: 2px solid #5a3818;
        border-radius: 10px;
        cursor: pointer;
        color: #fff8e8;
        text-shadow: 1px 1px 0 #5a3a18;
        transition: transform 0.1s, box-shadow 0.1s;
        background:
          linear-gradient(180deg, #b8884a 0%, #b8884a 6px, transparent 6px),
          linear-gradient(180deg, transparent calc(100% - 6px), #6a4420 calc(100% - 6px)),
          repeating-linear-gradient(180deg, transparent, transparent 8px, rgba(112,64,32,0.12) 8px, rgba(112,64,32,0.12) 9px),
          linear-gradient(180deg, #9b6b36, #8b5e30);
        box-shadow: 0 4px 0 #5a3818, 0 6px 12px rgba(0,0,0,0.35), inset 0 1px 0 rgba(212,168,106,0.25);
      }
      #lobby button:hover {
        transform: translateY(-1px);
        box-shadow: 0 5px 0 #5a3818, 0 8px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(212,168,106,0.3);
      }
      #lobby button:active {
        transform: translateY(3px);
        box-shadow: 0 1px 0 #5a3818, 0 2px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(212,168,106,0.15);
      }
      #btn-local {
        width: 100%;
        font-size: 20px;
        padding: 16px 32px;
      }
      #btn-create { width: 100%; }
      button:disabled {
        opacity: 0.4;
        cursor: default;
        transform: none !important;
      }

      /* ── Online section ── */
      .online-actions { display: flex; flex-direction: column; gap: 12px; align-items: center; }
      .online-divider {
        color: rgba(255,248,232,0.5);
        font-size: 13px;
        margin: 2px 0;
      }
      .join-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        align-items: center;
        width: 100%;
      }
      #lobby input {
        font-family: 'Fredoka', sans-serif;
        font-size: 24px;
        text-align: center;
        letter-spacing: 6px;
        padding: 10px 12px;
        width: 140px;
        border: 2px solid #5a3818;
        border-radius: 10px;
        background: rgba(139,94,48,0.35);
        color: #fff8e8;
        outline: none;
        text-transform: uppercase;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.25), 0 1px 0 rgba(212,168,106,0.15);
      }
      #lobby input:focus { border-color: #b8884a; background: rgba(139,94,48,0.5); }
      #lobby input::placeholder { color: rgba(255,248,232,0.35); letter-spacing: 3px; font-size: 16px; }
      #lobby input:disabled { opacity: 0.4; }

      /* ── Waiting / Error ── */
      #lobby-waiting { display: none; }
      #room-code {
        font-size: 52px;
        letter-spacing: 12px;
        font-weight: bold;
        margin: 12px 0;
        text-shadow: 2px 2px 0 #5a3a18;
      }
      #lobby-error {
        color: #ff8888;
        margin-top: 12px;
        min-height: 1.2em;
        font-size: 14px;
      }
      .offline-msg {
        color: rgba(255,248,232,0.4);
        font-size: 13px;
        font-style: italic;
      }
      .spinner {
        display: inline-block;
        width: 18px; height: 18px;
        border: 3px solid rgba(255,248,232,0.3);
        border-top-color: #fff8e8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        vertical-align: middle;
        margin-right: 8px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <canvas id="lobby-bg" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;"></canvas>
    <div id="lobby" style="position:relative;z-index:1;">
      <div class="logo-panel">
        <img src="/logo.svg" alt="Globulos" class="logo-img" />
      </div>

      <div id="lobby-menu">
        <!-- Local -->
        <div class="lobby-section">
          <h2>Même écran</h2>
          <button id="btn-local">Jouer à 2 en local</button>
          <p class="desc">Les deux joueurs partagent cet écran</p>
        </div>

        <!-- Online -->
        <div class="lobby-section" id="section-online">
          <h2>En ligne</h2>
          <div class="online-actions">
            <button id="btn-create" disabled>Créer une partie</button>
            <div class="online-divider">ou rejoindre avec un code</div>
            <div class="join-row">
              <input id="room-input" maxlength="4" placeholder="CODE" disabled />
              <button id="btn-join" disabled>OK</button>
            </div>
          </div>
          <p class="desc" id="online-status"><span class="spinner"></span>Connexion au serveur...</p>
        </div>
      </div>

      <div id="lobby-waiting">
        <div class="lobby-section">
          <p>Partagez ce code avec votre adversaire :</p>
          <p id="room-code"></p>
          <p><span class="spinner"></span>En attente...</p>
        </div>
      </div>

      <p id="lobby-error"></p>
    </div>
    <div id="app" style="display:none;"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
